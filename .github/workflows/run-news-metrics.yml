name: Run News Metrics (GDELT)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (adjust as you like)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run GDELT news metrics
        run: python scripts/news.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/
          git commit -m "Update news metrics" || echo "No changes to commit"
          git push
