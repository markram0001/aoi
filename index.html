<div style="display:flex; gap:30px;">

  <!-- Overall Top 100 -->
  <div style="flex:1;">
    <h2>Top 100 Posts (Overall)</h2>

    <div style="display:flex; font-weight:bold; border-bottom:1px solid #ccc; padding-bottom:4px;">
      <div style="width:80px;">Upvotes</div>
      <div>Title</div>
    </div>

    <div id="overall-list"
         style="height:120px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-top:5px;">
      Loading…
    </div>
  </div>

  <!-- AI Top 100 -->
  <div style="flex:1;">
    <h2>Top AI Posts</h2>

    <div style="display:flex; font-weight:bold; border-bottom:1px solid #ccc; padding-bottom:4px;">
      <div style="width:80px;">Upvotes</div>
      <div>Title</div>
    </div>

    <div id="ai-list"
         style="height:120px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-top:5px;">
      Loading…
    </div>
  </div>

</div>

<!-- NEW: Metrics Images -->
<div style="display:flex; gap:30px; margin-top:40px;">

  <div style="flex:1; text-align:center;">
    <h3>Density of Upvotes</h3>
    <img src="data/density_plot.png" style="width:100%; border:1px solid #ccc;">
  </div>

  <div style="flex:1; text-align:center;">
    <h3>Daily AI Hits in Top 100 Reddit posts</h3>
    <img src="data/X1_timeseries.png" style="width:100%; border:1px solid #ccc;">
  </div>

  <div style="flex:1; text-align:center;">
    <h3>Daily AI Upvotes proportion relative to top 100 Reddit posts</h3>
    <img src="data/X2_timeseries.png" style="width:100%; border:1px solid #ccc;">
  </div>

</div>

<script>
async function loadRedditData() {
  const response = await fetch("data/reddit.json");
  const json = await response.json();

  const overall = json.reddit.all_top100_posts;
  const ai = json.reddit.ai_posts_all;

  // ⭐ ADDED: load ai_posts_top100
  const aiTop100 = json.reddit.ai_posts_top100 || [];

  // ⭐ ADDED: build a Set of titles for fast matching
  const aiTop100Set = new Set(aiTop100.map(p => p.title));

  const overallDiv = document.getElementById("overall-list");
  const aiDiv = document.getElementById("ai-list");

  // ⭐ MODIFIED: highlight matches in red
  overallDiv.innerHTML = overall
    .map(p => {
      const isAI = aiTop100Set.has(p.title);   // ⭐ ADDED
      return `
        <div style="display:flex; margin-bottom:4px; color:${isAI ? 'red' : 'inherit'};">
          <div style="width:80px; font-weight:bold;">${p.score}</div>
          <div>${p.title}</div>
        </div>
      `;
    })
    .join("");

  // (unchanged)
  aiDiv.innerHTML = ai
    .map(p => `
      <div style="display:flex; margin-bottom:4px;">
        <div style="width:80px; font-weight:bold;">${p.score}</div>
        <div>${p.title}</div>
      </div>
    `)
    .join("");
}

loadRedditData();
</script>
