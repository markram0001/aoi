<div style="display:flex; gap:20px;">

  <!-- Overall Top 100 -->
  <div style="flex:1;">
    <h2>Top 100 Posts (Overall)</h2>
    <div id="overall-list" 
         style="height:400px; overflow-y:scroll; border:1px solid #ccc; padding:10px;">
      Loading…
    </div>
  </div>

  <!-- AI Top 100 -->
  <div style="flex:1;">
    <h2>Top AI Posts</h2>
    <div id="ai-list" 
         style="height:400px; overflow-y:scroll; border:1px solid #ccc; padding:10px;">
      Loading…
    </div>
  </div>

</div>

<script>
async function loadRedditData() {
  const response = await fetch("data/reddit.json");
  const json = await response.json();

  const overall = json.reddit.all_top100_posts;
  const ai = json.reddit.ai_posts_top100;

  const overallDiv = document.getElementById("overall-list");
  const aiDiv = document.getElementById("ai-list");

  overallDiv.innerHTML = overall
    .map(p => `<div><strong>${p.score}</strong> — ${p.title}</div>`)
    .join("");

  aiDiv.innerHTML = ai
    .map(p => `<div><strong>${p.score}</strong> — ${p.title}</div>`)
    .join("");
}

loadRedditData();
</script>
